name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-potrace
            mingw-w64-x86_64-libagg
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-pillow
            mingw-w64-x86_64-python-scikit-image
            mingw-w64-x86_64-pyinstaller
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-cython
            mingw-w64-x86_64-gcc

      - name: Setup venv and install all Python deps
        run: |
          python -m venv --system-site-packages /tmp/venv
          curl -sLo /tmp/pypotrace-0.3.tar.gz https://files.pythonhosted.org/packages/d7/58/bcd8a2b090e51100e690c61c245974b923911255757fd3367f0aa8c2c0cb/pypotrace-0.3.tar.gz
          tar xzf /tmp/pypotrace-0.3.tar.gz -C /tmp
          cd /tmp/pypotrace-0.3
          # Patch pyproject.toml: switch from poetry-core to setuptools
          python -c "
            import re
            with open('pyproject.toml') as f:
                content = f.read()
            content = re.sub(
                r'requires = \[[^\]]*\]',
                'requires = [\"setuptools>=61.0\", \"wheel\", \"Cython\", \"numpy\"]',
                content
            )
            content = content.replace('build-backend = \"poetry.core.masonry.api\"', 'build-backend = \"setuptools.build_meta\"')
            with open('pyproject.toml', 'w') as f:
                f.write(content)
          "
          # Patch setup.py: add CWD to sys.path before importing local build.py
          python -c "
            with open('setup.py') as f:
                lines = f.readlines()
            for i, line in enumerate(lines):
                if 'from build import *' in line:
                    lines.insert(i, 'import sys; sys.path.insert(0, \".\")\n')
                    break
            with open('setup.py', 'w') as f:
                f.writelines(lines)
          "
          /tmp/venv/bin/python setup.py install
          /tmp/venv/bin/pip install Flask==2.2.5 Flask_Cors==3.0.10

      - name: Verify all imports
        run: |
          /tmp/venv/bin/python -c "
          import flask
          import numpy
          import PIL
          import skimage
          import potrace
          print('All core imports OK')
          try:
              import cv2
              print('OpenCV available')
          except ImportError:
              print('OpenCV not available (using skimage fallback)')
          print('Backend:', 'opencv' if __import__('sys').modules.get('cv2') else 'skimage')
          "

      - name: Build with PyInstaller
        run: |
          /tmp/venv/bin/pyinstaller \
            --noconfirm \
            --onedir \
            --noconsole \
            --name "DesmosBezierRenderer" \
            --add-data "frontend;frontend" \
            --hidden-import "potrace.bezier" \
            --hidden-import "potrace.agg" \
            --hidden-import "potrace.agg.curves" \
            backend.py

      - name: Verify build output
        run: |
          test -f dist/DesmosBezierRenderer/backend.exe && echo "EXE exists OK"

      - name: Smoke test
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\DesmosBezierRenderer\backend.exe" -NoNewWindow -PassThru
          Start-Sleep -Seconds 10
          try {
            $res = Invoke-WebRequest -Uri "http://127.0.0.1:5000/calculator" -UseBasicParsing -TimeoutSec 10
            if ($res.StatusCode -eq 200) { Write-Host "SMOKE TEST PASSED - HTTP 200" }
            else { throw "Unexpected status: $($res.StatusCode)" }
          } catch {
            throw "Smoke test failed: $_"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\DesmosBezierRenderer\*" -DestinationPath "DesmosBezierRenderer-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: DesmosBezierRenderer-Windows
          path: DesmosBezierRenderer-Windows.zip

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: DesmosBezierRenderer-Windows.zip
          generate_release_notes: true
