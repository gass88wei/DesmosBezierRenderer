name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-potrace
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-pillow
            mingw-w64-x86_64-python-scikit-image
            mingw-w64-x86_64-pyinstaller

      - name: Setup venv and install Python deps
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install Flask==2.2.5 Flask_Cors==3.0.10

      - name: Verify all imports
        run: |
          /tmp/venv/bin/python -c "
          import flask
          import numpy
          import PIL
          import skimage
          print('All core imports OK')
          try:
              import cv2
              print('OpenCV available')
          except ImportError:
              print('OpenCV not available (using skimage fallback)')
          "

      - name: Build with PyInstaller
        run: |
          /tmp/venv/bin/pyinstaller \
            --noconfirm \
            --onedir \
            --noconsole \
            --name "DesmosBezierRenderer" \
            --add-data "frontend;frontend" \
            backend.py

      - name: Verify build output
        run: |
          test -f dist/DesmosBezierRenderer/backend.exe && echo "EXE exists OK"

      - name: Smoke test
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\DesmosBezierRenderer\backend.exe" -NoNewWindow -PassThru
          Start-Sleep -Seconds 10
          try {
            $res = Invoke-WebRequest -Uri "http://127.0.0.1:5000/calculator" -UseBasicParsing -TimeoutSec 10
            if ($res.StatusCode -eq 200) { Write-Host "SMOKE TEST PASSED - HTTP 200" }
            else { throw "Unexpected status: $($res.StatusCode)" }
          } catch {
            throw "Smoke test failed: $_"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\DesmosBezierRenderer\*" -DestinationPath "DesmosBezierRenderer-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: DesmosBezierRenderer-Windows
          path: DesmosBezierRenderer-Windows.zip

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: DesmosBezierRenderer-Windows.zip
          generate_release_notes: true
